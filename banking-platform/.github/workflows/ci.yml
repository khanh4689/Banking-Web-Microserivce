name: CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    name: Build & Test — ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - account-service
          - user-service
          - transaction-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x banking-platform/gradlew

      - name: Build common module
        working-directory: banking-platform
        run: ./gradlew :banking-common:jar --no-daemon

      - name: Run tests for ${{ matrix.service }}
        working-directory: banking-platform
        run: ./gradlew :${{ matrix.service }}:test --no-daemon --rerun-tasks

      - name: Build JAR for ${{ matrix.service }}
        working-directory: banking-platform
        run: ./gradlew :${{ matrix.service }}:bootJar --no-daemon

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.service }}
          path: banking-platform/${{ matrix.service }}/build/reports/tests/

  docker-build:
    name: Docker Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build-and-test

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            port: 8082
          - service: account-service
            port: 8083
          - service: user-service
            port: 8081
          - service: transaction-service
            port: 8084

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x banking-platform/gradlew

      - name: Build JAR
        working-directory: banking-platform
        run: ./gradlew :banking-common:jar :${{ matrix.service }}:bootJar --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        working-directory: banking-platform
        run: |
          docker build \
            -f ${{ matrix.service }}/Dockerfile \
            -t banking/${{ matrix.service }}:${{ github.sha }} \
            -t banking/${{ matrix.service }}:latest \
            .
